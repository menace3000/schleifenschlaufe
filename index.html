<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Schleifenschlaufe</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

   #symbol {
  opacity: 0;

  /* extrem subtil: 49.8% */
  transform: scale(0.499);

  transition:
    opacity 2s ease-out,
    transform 2s cubic-bezier(0.22, 1, 0.36, 1);
}

#symbol.visible {
  opacity: 1;

  /* Ziel: 50% */
  transform: scale(0.5);
    }

    #symbol img {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }

    .impressum {
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 11px;
      color: #666;
      font-family: Arial, sans-serif;
    }

    .impressum a {
      color: #666;
      text-decoration: none;
    }

    .impressum a:hover {
      text-decoration: underline;
    }

  </style>

</head>
<body>

  <div id="symbol">
    <img src="magenta_black.png?v=3" alt="Schleifenschlaufe">
  </div>

  <div class="impressum">
    <a href="impressum.html">Impressum</a>
  </div>

  <script>
    window.addEventListener("load", function() {
      document.getElementById("symbol").classList.add("visible");
    });
  </script>

</body>
</html>
