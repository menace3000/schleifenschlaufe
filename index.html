<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Schleifenschlaufe</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
    }

    #symbol {
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 2s ease-out, transform 2s ease-out;
    }

    #symbol.visible {
      opacity: 1;
      transform: scale(1);
    }

    #symbol img {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }

    .impressum {
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 11px;
      color: #666;
      font-family: Arial, sans-serif;
    }

    .impressum a {
      color: #666;
      text-decoration: none;
    }

  </style>

</head>
<body>

  <div id="symbol">
    <img src="magenta_black.png?v=2" alt="Schleifenschlaufe">
  </div>

  <div class="impressum">
    <a href="impressum.html">Impressum</a>
  </div>

  <script>
    window.addEventListener("load", function() {
      document.getElementById("symbol").classList.add("visible");
    });
  </script>

</body>
</html>
