<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Schleifenschlaufe</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    img {
      max-width: 100%;
      max-height: 100%;

      /* Startzustand */
      opacity: 0;
      transform: scale(0.99);

      /* Animation */
      animation: fadeScaleIn 2.5s ease-out forwards;
      animation-delay: 0.2s;
    }

    @keyframes fadeScaleIn {
      from {
        opacity: 0;
        transform: scale(0.99);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .impressum {
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 11px;
      color: #666;
      font-family: Arial, sans-serif;
    }

    .impressum a {
      color: #666;
      text-decoration: none;
    }

    .impressum a:hover {
      text-decoration: underline;
    }

  </style>

</head>
<body>

  <img src="magenta_black.png" alt="Schleifenschlaufe">

  <div class="impressum">
    <a href="impressum.html">Impressum</a>
  </div>

</body>
</html>
