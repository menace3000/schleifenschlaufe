<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Schleifenschlaufe</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html, body {
  margin: 0;
  padding: 0;
  background: black;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;

  /* Safari-Fix Kombination */
  height: 100vh;
  height: 100svh;
  height: 100dvh;

  /* Safe-Area berücksichtigen */
  padding-bottom: env(safe-area-inset-bottom);

  position: relative;
  overflow: hidden;

  font-family: Arial, sans-serif;
}

    /* Symbol mit extrem subtilem Fade + Scale */
    #symbol {
      opacity: 0;
      transform: scale(0.498);

      transition:
        opacity 6s ease-out,
        transform 6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #symbol.visible {
      opacity: 1;
      transform: scale(0.5);
    }

    #symbol img {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }
#symbol {
  display: flex;
  justify-content: center;
  align-items: center;
}
    /* Impressum: visuell klein, aber gut klickbar */
  .impressum {
  position: fixed;
  bottom: 16px;
  right: 16px;
  z-index: 10;
}

.impressum a {
  display: inline-block;

  font-size: 12px;          /* vorher 11px */
  color: #888;              /* heller als vorher */
  text-decoration: none;

  padding: 8px 10px;

  opacity: 0.85;            /* vorher 0.6 */
  transition: opacity 0.3s ease, color 0.3s ease;
}

.impressum a:hover {
  opacity: 1;
  color: #aaa;
}

.impressum a:active {
  opacity: 1;
}

  </style>

</head>
<body>

  <div id="symbol">
    <img src="magenta_black.png?v=6" alt="Schleifenschlaufe">
  </div>

  <div class="impressum">
    <a href="impressum.html">Impressum</a>
  </div>

  <script>
    window.addEventListener("load", function() {
      document.getElementById("symbol").classList.add("visible");
    });
  </script>

</body>
</html>
